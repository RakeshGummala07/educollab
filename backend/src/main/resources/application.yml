server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: educollab-backend

  # MySQL
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # MongoDB
  data:
    mongodb:
      uri: ${MONGO_URI}
      database: ${DB_NAME}

    # Redis
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  # File upload limits
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: educollab-notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.educollab.dto.event"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # Email (SMTP)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gemini-2.5-flash}
          temperature: 0.6
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:gemini-embedding-001}
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_PORT:6334}
        collection-name: educollab-documents
        initialize-schema: true
    
# JWT
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION}

  cors:
    allowed-origins: ${CORS_ORIGINS}

  # AWS S3 / MinIO
  aws:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    region: ${AWS_REGION}
    bucket-name: ${AWS_BUCKET_NAME}
    endpoint: ${AWS_ENDPOINT:}

  # Media config
  media:
    max-image-size: 10485760
    max-video-size: 52428800
    allowed-image-types: image/jpeg,image/png,image/gif,image/webp
    allowed-video-types: video/mp4,video/quicktime,video/x-msvideo
  
  # Notifications
  notification:
    email-enabled: ${EMAIL_NOTIFICATIONS_ENABLED:false}
    from-address: ${MAIL_FROM:noreply@educollab.com}
    from-name: EduCollab

  # LiveKit (video calls)
  livekit:
    api-key: ${LIVEKIT_API_KEY}
    api-secret: ${LIVEKIT_API_SECRET}
    server-url: ${LIVEKIT_SERVER_URL:http://localhost:7880}
    ws-url: ${LIVEKIT_WS_URL:ws://localhost:7880}
    webhook-verify: ${LIVEKIT_WEBHOOK_VERIFY:true}

  # Meeting behavior
  meeting:
    attendance-threshold-seconds: 300
    auto-end-grace-minutes: 15

  # AI Assistant token quota — resets on a rolling window PLUS a hard daily cap
  ai-quota:
    window-hours: 5
    window-token-limit: 50000
    daily-token-limit: 150000

logging:
  level:
    com.educollab: DEBUG
    org.springframework.security: INFO
    software.amazon.awssdk: WARN
